<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="112" ry="112" fill="#0B1120"/>

  <!-- Concentric radar rings -->
  <g transform="translate(256,256)" opacity="0.2">
    <circle cx="0" cy="0" r="170" fill="none" stroke="#3B82F6" stroke-width="1"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#3B82F6" stroke-width="1"/>
    <circle cx="0" cy="0" r="70" fill="none" stroke="#3B82F6" stroke-width="1"/>
  </g>

  <!-- Sweep wedge -->
  <g transform="translate(256,256)" opacity="0.15">
    <path d="M 0,0 L 0,-170 A 170,170 0 0,1 120,-120 Z" fill="#3B82F6"/>
  </g>

  <!-- Sweep line -->
  <line x1="256" y1="256" x2="256" y2="86" stroke="#60A5FA" stroke-width="1.5" opacity="0.5"/>

  <!-- Orbit arc -->
  <ellipse cx="256" cy="256" rx="195" ry="55" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.25" transform="rotate(-15,256,256)"/>

  <!-- Center core -->
  <circle cx="256" cy="256" r="12" fill="#60A5FA"/>
  <circle cx="256" cy="256" r="24" fill="#60A5FA" opacity="0.15"/>
  <circle cx="256" cy="256" r="40" fill="#60A5FA" opacity="0.06"/>

  <!-- Signal blips -->
  <circle cx="395" cy="200" r="6" fill="#60A5FA" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="135" r="5" fill="#60A5FA" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="330" r="5" fill="#60A5FA" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.15;0.4" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- Pulse waves -->
  <circle cx="346" cy="256" r="7" fill="none" stroke="#60A5FA" stroke-width="2.5" opacity="0.6"/>
  <circle cx="378" cy="256" r="7" fill="none" stroke="#60A5FA" stroke-width="2.5" opacity="0.4"/>
  <circle cx="410" cy="256" r="7" fill="none" stroke="#60A5FA" stroke-width="2.5" opacity="0.2"/>
</svg>
