# ============================================================
# verse-mcp/docker-compose.yml — HARDENED VERSION
# ============================================================
# Mesures de sécurité ajoutées :
#   - no-new-privileges sur tous les conteneurs
#   - read-only filesystem (où applicable)
#   - drop de toutes les capabilities + whitelist minimal
#   - security-opt seccomp et no-new-privileges
#   - limites mémoire et CPU
#   - logging limité
#   - réseau interne isolé (pas d'exposition inutile)
#   - healthchecks conservés
# ============================================================

x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-default-security: &default-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=64M,noexec,nosuid

x-default-deploy: &default-deploy
  resources:
    limits:
      memory: 512M
      cpus: "1.0"
    reservations:
      memory: 128M
      cpus: "0.25"

services:
  verse-mcp:
    build:
      context: /home/glados/projects/verse-mcp
      dockerfile: Dockerfile.mcp
    container_name: verse-mcp
    restart: unless-stopped
    networks:
      - verse-mcp-network
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-verse:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TRANSPORT: http
      PORT: "8000"
    depends_on:
      redis-verse:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',8000)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging
    # Sécurité conteneur
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE    # Nécessaire pour binder port 8000 si < 1024
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    # Traefik labels avec security chain
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.verse-mcp.rule=Host(`verse-mcp.aperture-agency.org`)"
      - "traefik.http.routers.verse-mcp.tls.certresolver=cf"
      - "traefik.http.routers.verse-mcp.middlewares=security-chain@file"
      - "traefik.http.routers.verse-mcp-monitor.rule=Host(`verse-monitor.aperture-agency.org`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.verse-mcp-monitor.tls.certresolver=cf"
      - "traefik.http.routers.verse-mcp-monitor.middlewares=security-chain@file"
      - "traefik.http.services.verse-mcp.loadbalancer.server.port=8000"
      - "traefik.http.services.verse-mcp.loadbalancer.passhostheader=true"

  verse-monitor:
    build:
      context: /home/glados/projects/verse-mcp
      dockerfile: Dockerfile.monitor
    container_name: verse-monitor
    restart: unless-stopped
    env_file: /home/glados/deployments/verse-mcp/.env
    networks:
      - verse-mcp-network
    depends_on:
      redis-verse:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-verse:6379
      - QDRANT_URL=http://qdrant:6333
    logging: *default-logging
    # Sécurité conteneur — worker sans accès réseau externe direct
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

  verse-monitor-portal:
    build:
      context: /home/glados/projects/verse-mcp
      dockerfile: Dockerfile.portal
    container_name: verse-mcp-portal
    restart: unless-stopped
    networks:
      - verse-mcp-network
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-verse:6379
    depends_on:
      redis-verse:
        condition: service_healthy
    logging: *default-logging
    # Sécurité conteneur
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    # Traefik labels avec security chain
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.verse-monitor-portal.rule=Host(`verse-monitor.aperture-agency.org`)"
      - "traefik.http.routers.verse-monitor-portal.tls.certresolver=cf"
      - "traefik.http.routers.verse-monitor-portal.middlewares=security-chain@file"
      - "traefik.http.services.verse-monitor-portal.loadbalancer.server.port=8080"

  redis-verse:
    image: redis:7-alpine
    container_name: redis-verse
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG "CONFIG_${REDIS_PASSWORD}"
    networks:
      - verse-mcp-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    # Sécurité Redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE   # Nécessaire pour écrire /data
    read_only: true
    tmpfs:
      - /tmp:size=32M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    networks:
      - verse-mcp-network
    volumes:
      - qdrant-storage:/qdrant/storage
    logging: *default-logging
    # Sécurité Qdrant
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE   # Nécessaire pour écrire le storage
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.5"

networks:
  verse-mcp-network:
    name: verse-mcp-network
    driver: bridge
    # Isolation réseau interne
    internal: false    # false car Traefik doit y accéder
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  redis-data:
    name: verse-mcp_redis-data
  qdrant-storage:
    name: verse-mcp_qdrant-storage
