# ============================================================
# verse-monitor/docker-compose.yml — HARDENED VERSION
# ============================================================
# Mesures de sécurité :
#   - no-new-privileges sur tous les conteneurs
#   - read-only filesystem (où applicable)
#   - drop de toutes les capabilities + whitelist minimal
#   - limites mémoire et CPU
#   - logging limité
#   - security headers Traefik inline (HSTS, CSP, X-Frame-Options, etc.)
#   - rate limiting Traefik inline
# ============================================================

x-default-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  verse-monitor-mcp:
    build:
      context: /home/glados/projects/verse-monitor
      dockerfile: Dockerfile.mcp
    container_name: verse-monitor-mcp
    restart: unless-stopped
    networks:
      - verse-monitor-network
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-verse:6379
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      TRANSPORT: http
      PORT: "8000"
    depends_on:
      redis-verse:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.settimeout(3); s.connect(('localhost',8000)); s.close()"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging: *default-logging
    # Sécurité conteneur
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.5"
    # Traefik labels — security headers inline
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.verse-monitor-mcp.rule=Host(`verse-monitor.aperture-agency.org`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.verse-monitor-mcp.tls.certresolver=cf"
      - "traefik.http.services.verse-monitor-mcp.loadbalancer.server.port=8000"
      - "traefik.http.services.verse-monitor-mcp.loadbalancer.passhostheader=true"
      # Rate limiting
      - "traefik.http.middlewares.mcp-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.mcp-ratelimit.ratelimit.period=1s"
      - "traefik.http.middlewares.mcp-ratelimit.ratelimit.burst=50"
      # Security headers
      - "traefik.http.middlewares.mcp-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.mcp-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.mcp-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.mcp-headers.headers.customFrameOptionsValue=SAMEORIGIN"
      - "traefik.http.middlewares.mcp-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.mcp-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.mcp-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.mcp-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=(), payment=()"
      - "traefik.http.middlewares.mcp-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
      - "traefik.http.middlewares.mcp-headers.headers.customResponseHeaders.Server="
      - "traefik.http.middlewares.mcp-headers.headers.customResponseHeaders.X-Powered-By="
      # Appliquer les middlewares
      - "traefik.http.routers.verse-monitor-mcp.middlewares=mcp-ratelimit,mcp-headers"

  verse-monitor-worker:
    build:
      context: /home/glados/projects/verse-monitor
      dockerfile: Dockerfile.monitor
    container_name: verse-monitor-worker
    restart: unless-stopped
    env_file: /home/glados/deployments/verse-monitor/.env
    networks:
      - verse-monitor-network
    depends_on:
      redis-verse:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis-verse:6379
      - QDRANT_URL=http://qdrant:6333
    logging: *default-logging
    # Sécurité conteneur — worker sans accès réseau externe direct
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"

  verse-monitor-portal:
    build:
      context: /home/glados/projects/verse-monitor
      dockerfile: Dockerfile.portal
    container_name: verse-monitor-portal
    restart: unless-stopped
    networks:
      - verse-monitor-network
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis-verse:6379
    depends_on:
      redis-verse:
        condition: service_healthy
    logging: *default-logging
    # Sécurité conteneur
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"
    # Traefik labels — security headers inline
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.verse-monitor-portal.rule=Host(`verse-monitor.aperture-agency.org`)"
      - "traefik.http.routers.verse-monitor-portal.tls.certresolver=cf"
      - "traefik.http.services.verse-monitor-portal.loadbalancer.server.port=8080"
      # Rate limiting
      - "traefik.http.middlewares.portal-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.portal-ratelimit.ratelimit.period=1s"
      - "traefik.http.middlewares.portal-ratelimit.ratelimit.burst=200"
      # Security headers
      - "traefik.http.middlewares.portal-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.portal-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.portal-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.portal-headers.headers.customFrameOptionsValue=SAMEORIGIN"
      - "traefik.http.middlewares.portal-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.portal-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.portal-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.portal-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=(), payment=()"
      - "traefik.http.middlewares.portal-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
      - "traefik.http.middlewares.portal-headers.headers.customResponseHeaders.Server="
      - "traefik.http.middlewares.portal-headers.headers.customResponseHeaders.X-Powered-By="
      # Appliquer les middlewares
      - "traefik.http.routers.verse-monitor-portal.middlewares=portal-ratelimit,portal-headers"

  redis-verse:
    image: redis:7-alpine
    container_name: redis-verse
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
      --rename-command CONFIG "CONFIG_${REDIS_PASSWORD}"
    networks:
      - verse-monitor-network
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    # Sécurité Redis
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    read_only: true
    tmpfs:
      - /tmp:size=32M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: "0.5"
        reservations:
          memory: 64M
          cpus: "0.1"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    networks:
      - verse-monitor-network
    volumes:
      - qdrant-storage:/qdrant/storage
    logging: *default-logging
    # Sécurité Qdrant
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    # Qdrant n'a pas besoin de read_only car il écrit dans /qdrant/snapshots/tmp
    # qui est sur le volume persistant. Le read_only bloque les snapshots.
    tmpfs:
      - /tmp:size=64M,noexec,nosuid
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M
          cpus: "0.5"

networks:
  verse-monitor-network:
    name: verse-monitor-network
    driver: bridge
    internal: false
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
      com.docker.network.bridge.enable_ip_masquerade: "true"

volumes:
  redis-data:
    name: verse-monitor_redis-data
  qdrant-storage:
    name: verse-monitor_qdrant-storage
